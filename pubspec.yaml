name: mi_changan
description: Changan CS35 Plus Tracker — kilometraje, mantenimiento y servicios para el mercado venezolano.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Auth & Backend
  supabase_flutter: ^2.5.0

  # State management — Riverpod (AD5)
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Routing — GoRouter (AD6)
  go_router: ^14.1.4

  # Local storage — Drift (SQLite)
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.22
  path_provider: ^2.1.3
  path: ^1.9.0
  shared_preferences: ^2.2.3

  # Maps
  flutter_map: ^7.0.1
  latlong2: ^0.9.1

  # Charts
  fl_chart: ^0.68.0

  # Utilities
  intl: ^0.19.0
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Riverpod code generation (AD5)
  riverpod_generator: ^2.4.3
  build_runner: ^2.4.11

  # Linting (AD4 structure enforcer)
  flutter_lints: ^4.0.0

  # Drift code generation
  drift_dev: ^2.18.0

flutter:
  uses-material-design: true
  # Assets and fonts will be added per-feature as features are implemented
